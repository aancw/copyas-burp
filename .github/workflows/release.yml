name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build
        run: |
          gradle --no-daemon clean jar
          echo "--- build/libs contents ---"
          ls -la build/libs/

      - name: Stage artifact
        run: |
          set -e
          echo "--- build/libs after build ---"
          ls -la build/libs/ 2>&1 || true
          SRC=$(ls build/libs/*.jar 2>/dev/null | head -n 1 || true)
          if [ -z "$SRC" ]; then
            echo "::error::No JAR produced under build/libs/"
            exit 1
          fi
          echo "Copying $SRC -> copyas-burp.jar"
          cp "$SRC" copyas-burp.jar

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: copyas-burp.jar
