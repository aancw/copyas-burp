name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build
        run: |
          gradle --no-daemon clean jar
          echo "--- build/libs contents ---"
          ls -la build/libs/

      - name: Stage artifact
        run: cp build/libs/copyas-burp.jar copyas-burp.jar

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: copyas-burp.jar
